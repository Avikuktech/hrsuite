name: Deploy Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Test SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 187.127.141.113
          username: root
          port: 22
          key: ${{ secrets.SSH_KEY }}
          debug: true
          script: |
            whoami
            pwd
            hostname